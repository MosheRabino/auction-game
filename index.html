<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מכירה פומבית - שרת פרטי</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e; --card-bg: #162447; --accent-color: #00d2fc;
            --text-color: #ffffff; --muted-text: #b0b0b0; --success-color: #4cd137; --danger-color: #e84118;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; max-width: 900px; text-align: center; margin-bottom: 25px; }
        h1 { color: var(--accent-color); }
        .btn { background-color: var(--accent-color); color: #000; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background-color: #555 !important; color: #aaa !important; cursor: not-allowed; }
        .container { width: 100%; max-width: 900px; }
        .panel { background-color: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-bottom: 25px; }
        .name-section { margin-bottom: 25px; background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 15px; }
        .name-input { flex-grow: 1; max-width: 300px; background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); padding: 10px 15px; border-radius: 6px; color: white; outline: none; }
        .share-link-section { background: rgba(0, 210, 252, 0.05); border: 1px dashed var(--accent-color); padding: 15px; border-radius: 8px; margin-bottom: 25px; text-align: center; }
        .link-box { background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; font-family: monospace; margin-bottom: 10px; word-break: break-all; }
        .game-layout { display: flex; flex-direction: column; gap: 25px; width: 100%; }
        .arena { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 25px; text-align: center; border: 1px dashed rgba(255,255,255,0.2); max-width: 600px; margin: 0 auto; width: 100%; }
        .turn-indicator { font-size: 1.3rem; font-weight: bold; color: #f1c40f; margin-bottom: 10px; background: rgba(241, 196, 15, 0.1); padding: 8px; border-radius: 6px; display: inline-block; }
        .lot-name { font-size: 2.2rem; color: #ffffff; font-weight: bold; }
        .lot-team { font-size: 1rem; color: var(--accent-color); margin-bottom: 15px; }
        .bid-slider-container { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin: 20px 0; }
        .slider-row { display: flex; align-items: center; gap: 15px; }
        .range-slider { flex-grow: 1; accent-color: var(--accent-color); }
        .slider-val { font-size: 1.5rem; font-weight: bold; color: var(--success-color); min-width: 50px; }
        .action-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-pass { background-color: var(--danger-color); color: white; }
        .btn-continue { background-color: var(--success-color); color: white; }
        .teams-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: rgba(0, 0, 0, 0.15); padding: 20px; border-radius: 12px; }
        .player-column { display: flex; flex-direction: column; }
        .player-title { font-size: 1.1rem; font-weight: bold; }
        .budget { color: var(--success-color); font-weight: bold; }
        .roster-table-list { list-style: none; }
        .roster-table-list li { font-size: 0.95rem; padding: 6px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: var(--muted-text); }
        .slot-num { color: var(--accent-color); font-weight: bold; margin-left: 5px; }
        .summary-layout { text-align: center; background: var(--card-bg); border-radius: 16px; padding: 35px; border: 2px solid var(--accent-color); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>🏆 מכירה פומבית אונליין</h1>
    </header>

    <div class="container">
        <div class="panel" id="lobbyPanel">
            <div class="share-link-section">
                <div style="font-weight: bold; margin-bottom: 8px; color: var(--accent-color);">🔗 שלח את הקישור לחבר:</div>
                <div class="link-box" id="gameUrlBox">מייצר קישור...</div>
                <button class="btn" onclick="navigator.clipboard.writeText(window.location.href); alert('הועתק!');">העתק קישור</button>
            </div>

            <div class="name-section">
                <span style="font-weight: bold; color: var(--accent-color);">השם שלך:</span>
                <input type="text" id="usernameInput" class="name-input" maxlength="12" value="שחקן">
            </div>

            <div style="text-align: center;">
                <button class="btn" id="startBtn" style="font-size: 1.2rem; padding: 12px 50px;" onclick="connectToWebServer()">🚀 התחבר למשחק</button>
                <div id="waitingMsg" class="hidden" style="color: #f1c40f; margin-top: 15px; font-weight: bold;">ממתין שהחבר יתחבר... ⏳</div>
            </div>
        </div>

        <div class="game-layout hidden" id="gamePanel">
            <div class="arena">
                <div class="turn-indicator" id="turnDisplay">מתחילים...</div>
                <div class="lot-name" id="currentLot">-</div>
                <div class="lot-team" id="currentLotTeam">-</div>
                
                <div style="margin: 15px 0; font-size: 1.1rem;">
                    הצעה מובילה: <strong id="bidDisplay" style="color: var(--accent-color); font-size: 1.5rem;">$1</strong> 
                    <span id="bidder" style="color: var(--muted-text);">(מוביל: -)</span>
                </div>

                <div class="bid-slider-container">
                    <div class="slider-row">
                        <span id="minRangeLabel">$2</span>
                        <input type="range" id="bidRange" class="range-slider" min="2" max="20" value="2" oninput="document.getElementById('sliderAmountDisplay').innerText = '$'+this.value">
                        <span id="maxRangeLabel">$20</span>
                        <div class="slider-val" id="sliderAmountDisplay">$2</div>
                    </div>
                </div>
                
                <div class="action-btns">
                    <button class="btn" id="submitBidBtn" onclick="sendActionToServer('bid', {amount: parseInt(document.getElementById('bidRange').value), sender: myRole})">אישור</button>
                    <button class="btn btn-pass" id="passBtn" onclick="sendActionToServer('pass', {sender: myRole})">ויתור</button>
                </div>
            </div>

            <div class="teams-footer">
                <div class="player-column">
                    <span class="player-title" id="p2NameDisplay">שחקן 2</span>
                    <span class="budget" id="p2Money">$20</span>
                    <ul class="roster-table-list" id="p2Roster"></ul>
                </div>
                <div class="player-column" style="text-align: right;">
                    <span class="player-title" id="p1NameDisplay">שחקן 1</span>
                    <span class="budget" id="p1Money">$20</span>
                    <ul class="roster-table-list" id="p1Roster"></ul>
                </div>
            </div>
        </div>

        <div class="summary-layout hidden" id="summaryPanel">
            <h2>🏁 המשחק הסתיים!</h2>
            <button class="btn" onclick="location.reload()">משחק חדש</button>
        </div>
    </div>

    <script>
        // === כתובת השרת של RENDER ===
        // כשאתה מריץ על המחשב: השאר localhost. כשתעלה ל-Render: החלף בקישור שהם יתנו לך.
        const SERVER_URL = "https://auction-game-server.onrender.com"; 
        // =============================

        const playersPool = [
            { name: "ערן זהבי", team: "מכבי תל אביב" }, { name: "מנור סולומון", team: "טוטנהאם" },
            { name: "אוסקר גלוך", team: "רד בול זלצבורג" }, { name: "דני אבדיה", team: "פורטלנד" },
            { name: "ים מדר", team: "באיירן מינכן" }, { name: "קיליאן אמבפה", team: "ריאל מדריד" }
        ];

        let socket;
        let myRole = null;
        let myName = "";
        const urlParams = new URLSearchParams(window.location.search);
        let roomCode = urlParams.get('room');
        
        if (!roomCode) {
            roomCode = Math.floor(10000 + Math.random() * 90000).toString();
            window.history.replaceState({}, '', `?room=${roomCode}`);
        }
        document.getElementById('gameUrlBox').innerText = window.location.href;

        function connectToWebServer() {
            myName = document.getElementById('usernameInput').value.trim() || "שחקן";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('waitingMsg').classList.remove('hidden');
        
            // הגדרה מפורשת של פרוטוקול החיבור כדי למנוע נפילה ל-localhost
            socket = io(SERVER_URL, {
                transports: ['websocket'],
                upgrade: false
            });
        
            socket.emit('join-room', { roomCode, username: myName });
        
            socket.on('init-role', (role) => {
                myRole = role;
            });
        
            socket.on('game-sync', (roomData) => {
                if(roomData.gameState.started) {
                    renderGameUI(roomData);
                }
            });
        
            // שלב בדיקה: הדפסת שגיאות לקונסול בזמן אמת במידה ויש
            socket.on('connect_error', (error) => {
                console.error("Socket connection failed:", error);
            });
        }
        
        function sendActionToServer(actionType, actionData) {
            socket.emit('game-action', { roomCode, actionType, data: actionData });
        }

        function renderGameUI(roomData) {
            document.getElementById('lobbyPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');

            const state = roomData.gameState;
            
            document.getElementById('p1NameDisplay').innerText = roomData.p1.name;
            document.getElementById('p1Money').innerText = `$${roomData.p1.money}`;
            document.getElementById('p2NameDisplay').innerText = roomData.p2.name;
            document.getElementById('p2Money').innerText = `$${roomData.p2.money}`;

            if (roomData.p1.roster.length >= 5 && roomData.p2.roster.length >= 5) {
                document.getElementById('gamePanel').classList.add('hidden');
                document.getElementById('summaryPanel').classList.remove('hidden');
                return;
            }

            const currentLot = playersPool[state.lotIndex % playersPool.length];
            document.getElementById('currentLot').innerText = currentLot.name;
            document.getElementById('currentLotTeam').innerText = currentLot.team;

            document.getElementById('bidDisplay').innerText = `$${state.currentBid}`;
            const leaderName = state.leadingBidder === 'p1' ? roomData.p1.name : roomData.p2.name;
            document.getElementById('bidder').innerText = `(מוביל: ${leaderName})`;

            const activeName = state.currentTurn === 'p1' ? roomData.p1.name : roomData.p2.name;
            document.getElementById('turnDisplay').innerText = `תור: ${activeName}`;

            updateRosterList('p1Roster', roomData.p1.roster);
            updateRosterList('p2Roster', roomData.p2.roster);

            const isMyTurn = myRole === state.currentTurn;
            document.getElementById('submitBidBtn').disabled = !isMyTurn;
            document.getElementById('passBtn').disabled = !isMyTurn;
            document.getElementById('bidRange').disabled = !isMyTurn;

            const passBtn = document.getElementById('passBtn');
            if (state.isInitial && state.currentTurn === state.leadingBidder) {
                passBtn.innerText = "המשך";
                passBtn.className = "btn btn-continue";
            } else {
                passBtn.innerText = "ויתור";
                passBtn.className = "btn btn-pass";
            }

            if (isMyTurn) {
                const myData = myRole === 'p1' ? roomData.p1 : roomData.p2;
                const maxBid = myData.money - (5 - myData.roster.length - 1);
                const minBid = state.currentBid + 1;

                const slider = document.getElementById('bidRange');
                if (minBid > maxBid) {
                    slider.disabled = true;
                    document.getElementById('submitBidBtn').disabled = true;
                } else {
                    slider.min = minBid;
                    slider.max = maxBid;
                    slider.value = minBid;
                    document.getElementById('minRangeLabel').innerText = `$${minBid}`;
                    document.getElementById('maxRangeLabel').innerText = `$${maxBid}`;
                    document.getElementById('sliderAmountDisplay').innerText = `$${minBid}`;
                }
            }
        }

        function updateRosterList(id, arr) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            for(let i=1; i<=5; i++) {
                el.innerHTML += `<li><span class="slot-num">${i}.</span> ${arr[i-1] || '-'}</li>`;
            }
        }
    </script>
</body>
</html>
